services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: central-data-api-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - central-data-network
    depends_on:
      - mysql
      - redis
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=central_data_api
      - DB_USERNAME=centraluser
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=predis
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis

  nginx:
    image: nginx:alpine
    container_name: central-data-api-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - central-data-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: central-data-api-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: central_data_api
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: centraluser
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - central-data-network

  redis:
    image: redis:7-alpine
    container_name: central-data-api-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - central-data-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: central-data-api-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: secret
    networks:
      - central-data-network
    depends_on:
      - mysql

volumes:
  mysql_data:
  redis_data:

networks:
  central-data-network:
    driver: bridge
